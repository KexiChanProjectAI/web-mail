# Cloudflare Workers Configuration Template
# https://developers.cloudflare.com/workers/wrangler/configuration/
#
# COPY THIS FILE TO wrangler.toml AND FILL IN YOUR VALUES
# DO NOT COMMIT THE ACTUAL wrangler.toml WITH REAL SECRETS

name = "web-mail"
main = "src/index.ts"
compatibility_date = "2025-06-01"

# Account ID - optional for email Workers; only required for certain wrangler
# commands (e.g., deploying with zone-specific features). Remove/comment if not needed.
# Found in: Cloudflare Dashboard > Workers & Pages > Overview > Account ID
# account_id = "your-account-id-here"

# Route configuration — NOT used by Cloudflare Email Routing.
# Email Routing routes are managed via Cloudflare Dashboard > Email > Email Routing.
# The block below is only for optional HTTP endpoints (e.g., a health-check route).
# [[routes]]
# pattern = "mail.yourdomain.com"
# zone_name = "yourdomain.com"

# Secrets MUST be set via Cloudflare Dashboard or wrangler CLI, NOT in this file.
# Required secrets:
#   wrangler secret put INGEST_URL
#   wrangler secret put WORKER_INGEST_PSK

# CPU time limit - NOT supported on Free plan; remove or upgrade to paid plan
# [limits]
# cpu_ms = 100
